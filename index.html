<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co; img-src 'self' data:;">
  <title>ProgressOS — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/match-day.css">
  <link rel="stylesheet" href="css/daily-challenge.css">
</head>
<body>
  <main class="page-content" id="main-content">
    <div id="player-card"></div>
    <div class="stats-row" id="stats-row"></div>
    <div id="match-nudge-slot" class="match-nudge-slot"></div>
    <div id="match-widget-section"></div>
    <section id="challenge-section" class="dashboard-section"></section>
    <div class="dashboard-section" id="heatmap-section"></div>
    <div class="dashboard-section" id="focus-section"></div>
    <div class="dashboard-section" id="feed-section"></div>
  </main>

  <button class="fab" id="fab-add" aria-label="Add task">
    <i data-lucide="plus"></i>
  </button>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="index.html" class="nav-item active" aria-current="page">
      <i data-lucide="layout-dashboard"></i>
      <span>Home</span>
    </a>
    <a href="tasks.html" class="nav-item">
      <i data-lucide="check-square"></i>
      <span>Tasks</span>
    </a>
    <a href="habits.html" class="nav-item">
      <i data-lucide="repeat"></i>
      <span>Habits</span>
    </a>
    <a href="projects.html" class="nav-item">
      <i data-lucide="folder-open"></i>
      <span>Projects</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/time.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/xp.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/achievements-gallery.js"></script>
  <script src="js/events.js"></script>
  <script src="js/events-view.js"></script>
  <script src="js/match-widget.js"></script>
  <script src="js/match-detail.js"></script>
  <script src="js/match-day.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/daily-challenge.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
