<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co; img-src 'self' data:;">
  <title>ProgressOS — Log in</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .login-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-card);
      padding: 36px 28px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo-name {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent-primary);
      letter-spacing: -0.02em;
    }

    .login-logo-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'JetBrains Mono', monospace;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .form-input {
      padding-right: 50px;
    }

    .form-input {
      background: var(--bg-subtle);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-inner);
      padding: 13px 16px;
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition-fast);
      width: 100%;
      min-height: 48px;
    }

    .form-input:focus {
      border-color: var(--border-active);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .btn-eye {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      border-radius: var(--radius-badge);
      transition: color var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-eye:active { color: var(--text-primary); }
    .btn-eye svg { width: 16px; height: 16px; }

    .login-btn {
      background: var(--accent-primary);
      color: #0A0A0D;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-inner);
      padding: 14px 24px;
      min-height: 52px;
      cursor: pointer;
      width: 100%;
      transition: background var(--transition-fast), opacity var(--transition-fast);
      margin-top: 8px;
    }
    .login-btn:active { background: var(--accent-dim); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Auth view switching */
    .auth-view { }
    .auth-view--hidden { display: none; }
    .auth-view--entering { animation: authFadeUp 220ms ease-out; }

    @keyframes authFadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* View title (signup / reset) */
    .auth-view-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    /* Links below login form */
    .auth-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 20px;
    }

    .auth-link-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 10px 16px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-badge);
      transition: color var(--transition-fast), background var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .auth-link-btn:active { color: var(--text-primary); background: var(--bg-subtle); }
    .auth-link-btn--accent { color: var(--accent-primary); font-weight: 600; }
    .auth-link-btn--accent:active { color: var(--accent-dim); }

    .auth-divider {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Back button inside non-login views */
    .btn-back-auth {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 44px;
      padding: 10px;
      margin-top: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      border-radius: var(--radius-badge);
      transition: color var(--transition-fast), background var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back-auth:active { color: var(--text-primary); background: var(--bg-subtle); }

    /* Success state (shown after signup / reset email sent) */
    .auth-success {
      text-align: center;
      padding: 8px 0 4px;
    }
    .auth-success-icon {
      font-size: 32px;
      margin-bottom: 16px;
      display: block;
      color: var(--accent-primary);
    }
    .auth-success-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .auth-success-sub {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-name">ProgressOS</div>
        <div class="login-logo-sub">Your system. Your progress.</div>
      </div>

      <!-- View: Login (default) -->
      <div class="auth-view" id="view-login">
        <form class="login-form" id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input
              class="form-input"
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-wrap">
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              >
              <button type="button" class="btn-eye" data-target="password" aria-label="Show password">
                <i data-lucide="eye"></i>
              </button>
            </div>
          </div>
          <button class="login-btn" type="submit" id="login-btn">Log in</button>
        </form>
        <div class="auth-links">
          <button class="auth-link-btn" id="btn-show-forgot">Forgot password?</button>
          <span class="auth-divider">or</span>
          <button class="auth-link-btn auth-link-btn--accent" id="btn-show-signup">Create account</button>
        </div>
      </div>

      <!-- View: Sign up -->
      <div class="auth-view auth-view--hidden" id="view-signup">
        <p class="auth-view-title">Create account</p>
        <form class="login-form" id="signup-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="signup-email">Email</label>
            <input
              class="form-input"
              type="email"
              id="signup-email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-password">Password</label>
            <div class="input-wrap">
              <input
                class="form-input"
                type="password"
                id="signup-password"
                autocomplete="new-password"
                placeholder="min. 6 characters"
                required
              >
              <button type="button" class="btn-eye" data-target="signup-password" aria-label="Show password">
                <i data-lucide="eye"></i>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-confirm">Confirm password</label>
            <div class="input-wrap">
              <input
                class="form-input"
                type="password"
                id="signup-confirm"
                autocomplete="new-password"
                placeholder="repeat password"
                required
              >
              <button type="button" class="btn-eye" data-target="signup-confirm" aria-label="Show password">
                <i data-lucide="eye"></i>
              </button>
            </div>
          </div>
          <button class="login-btn" type="submit" id="signup-btn">Create account</button>
        </form>
        <button class="btn-back-auth" id="btn-back-signup">← Back to login</button>
      </div>

      <!-- View: Reset password -->
      <div class="auth-view auth-view--hidden" id="view-reset">
        <p class="auth-view-title">Reset password</p>
        <form class="login-form" id="reset-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="reset-email">Email</label>
            <input
              class="form-input"
              type="email"
              id="reset-email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            >
          </div>
          <button class="login-btn" type="submit" id="reset-btn">Send reset link</button>
        </form>
        <button class="btn-back-auth" id="btn-back-reset">← Back to login</button>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/time.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
