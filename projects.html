<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co; img-src 'self' data:;">
  <title>ProgressOS — Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/match-day.css">
</head>
<body>
  <main class="page-content" id="main-content">

    <!-- List View -->
    <div class="projects-list-view" id="projects-list-view">
      <header class="page-header">
        <h1 class="page-title">Projects</h1>
      </header>
      <div id="project-filter-bar" class="filter-bar"></div>
      <div id="project-list" class="project-list"></div>
    </div>

    <!-- Detail View (slides in from right) -->
    <div class="project-detail-view" id="project-detail-view">
      <header class="detail-header">
        <button class="btn-back" id="btn-back" aria-label="Back to projects">
          <i data-lucide="arrow-left"></i>
        </button>
        <h1 class="detail-title" id="detail-title"></h1>
      </header>
      <div id="detail-content" class="detail-content"></div>
    </div>

  </main>

  <button class="fab" id="fab-add" aria-label="Add project">
    <i data-lucide="plus"></i>
  </button>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="index.html" class="nav-item">
      <i data-lucide="layout-dashboard"></i>
      <span>Home</span>
    </a>
    <a href="tasks.html" class="nav-item">
      <i data-lucide="check-square"></i>
      <span>Tasks</span>
    </a>
    <a href="habits.html" class="nav-item">
      <i data-lucide="repeat"></i>
      <span>Habits</span>
    </a>
    <a href="projects.html" class="nav-item active" aria-current="page">
      <i data-lucide="folder-open"></i>
      <span>Projects</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/time.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/xp.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/match-day.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
